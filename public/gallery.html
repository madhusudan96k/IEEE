<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gallery – IEEE Student Chapter DBATU</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    /* ── GALLERY GRID ── */
    .gallery-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:16px;
    }
    .gal-item{
      border-radius:14px;overflow:hidden;
      aspect-ratio:4/3;position:relative;cursor:pointer;
      background:linear-gradient(135deg,var(--ieee-dark),var(--ieee-light));
      transition:transform .3s ease,box-shadow .3s ease;
    }
    .gal-item:hover{transform:scale(1.03);box-shadow:0 12px 40px rgba(0,102,153,.25);}
    .gal-item img{
      width:100%;height:100%;object-fit:cover;
      display:block;transition:opacity .3s;
    }
    .gal-overlay{
      position:absolute;inset:0;
      background:linear-gradient(to top,rgba(0,30,60,.85) 0%,transparent 55%);
      opacity:0;display:flex;flex-direction:column;
      justify-content:flex-end;padding:18px;
      transition:opacity .3s ease;
    }
    .gal-item:hover .gal-overlay{opacity:1;}
    .gal-title{color:#fff;font-family:'Outfit',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:3px;}
    .gal-cat  {color:rgba(255,255,255,.7);font-size:.78rem;}
    .gal-zoom {
      position:absolute;top:12px;right:12px;
      width:34px;height:34px;border-radius:50%;
      background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);
      display:flex;align-items:center;justify-content:center;
      color:#fff;font-size:.9rem;opacity:0;transition:opacity .3s;
    }
    .gal-item:hover .gal-zoom{opacity:1;}
    .gal-placeholder{
      width:100%;height:100%;
      display:flex;align-items:center;justify-content:center;
      font-size:3.5rem;color:rgba(255,255,255,.5);
    }
    .gal-item:nth-child(even) .gal-placeholder{filter:hue-rotate(30deg);}
    .gal-item:nth-child(3n)   .gal-placeholder{filter:hue-rotate(180deg);}

    /* ── CATEGORY FILTER ── */
    .cat-filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:36px;}

    /* ── LIGHTBOX ── */
    .lightbox{
      position:fixed;inset:0;z-index:2000;
      background:rgba(0,0,0,.92);
      display:flex;align-items:center;justify-content:center;
      padding:24px;opacity:0;pointer-events:none;
      transition:opacity .25s ease;
    }
    .lightbox.open{opacity:1;pointer-events:all;}
    .lb-box{
      position:relative;max-width:780px;width:100%;
      background:var(--card);border-radius:18px;overflow:hidden;
      transform:scale(.95);transition:transform .25s ease;
      box-shadow:0 32px 80px rgba(0,0,0,.5);
    }
    .lightbox.open .lb-box{transform:scale(1);}
    .lb-img-wrap{
      background:#000;max-height:68vh;
      display:flex;align-items:center;justify-content:center;overflow:hidden;
    }
    .lb-img-wrap img{max-width:100%;max-height:68vh;object-fit:contain;display:block;}
    .lb-placeholder{width:100%;height:320px;display:flex;align-items:center;justify-content:center;font-size:5rem;background:linear-gradient(135deg,var(--ieee-dark),var(--ieee-light));}
    .lb-info{padding:20px 24px;}
    .lb-info h3{font-family:'Outfit',sans-serif;font-weight:700;font-size:1.1rem;margin-bottom:4px;}
    .lb-info p {color:var(--text2);font-size:.88rem;}
    .lb-close{
      position:absolute;top:14px;right:14px;z-index:10;
      width:36px;height:36px;border-radius:50%;
      background:rgba(0,0,0,.5);border:none;cursor:pointer;
      color:#fff;font-size:1rem;display:flex;align-items:center;justify-content:center;
      transition:background .2s;
    }
    .lb-close:hover{background:rgba(229,62,62,.8);}

    /* ── EMPTY STATE ── */
    .empty-gallery{
      grid-column:1/-1;text-align:center;padding:80px 24px;
      color:var(--text2);
    }
    .empty-gallery i{font-size:3.5rem;color:var(--ieee-blue);opacity:.3;margin-bottom:16px;display:block;}
    .empty-gallery p{font-size:1rem;}
  </style>
</head>
<body>
<div id="nav-container"></div>

<!-- Hero Banner -->
<div class="pt-nav" style="background:linear-gradient(145deg,#001e3c,#003f6b,#006699);padding:72px 0 60px">
  <div class="container" style="text-align:center">
    <span class="section-badge">Gallery</span>
    <h1 style="font-family:'Outfit',sans-serif;font-size:clamp(2.2rem,5vw,3.5rem);font-weight:700;color:#fff;margin:12px 0 16px">Moments &amp; Memories</h1>
    <p style="color:rgba(255,255,255,.75);max-width:520px;margin:0 auto;font-size:1.05rem;line-height:1.7">A visual journey through our workshops, hackathons, seminars, and celebrations at DBATU.</p>
  </div>
</div>

<section class="section">
  <div class="container">

    <!-- Category filter buttons (populated dynamically) -->
    <div class="cat-filters" id="catFilters">
      <button class="filter-btn active" onclick="filterCat('all',this)">All Photos</button>
    </div>

    <!-- Gallery grid -->
    <div class="gallery-grid" id="galleryGrid">
      <div class="empty-gallery" style="grid-column:1/-1">
        <i class="fa fa-spinner fa-spin"></i>
        <p>Loading gallery…</p>
      </div>
    </div>
  </div>
</section>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLB(event)">
  <div class="lb-box" id="lbBox">
    <button class="lb-close" onclick="document.getElementById('lightbox').classList.remove('open')">
      <i class="fa fa-times"></i>
    </button>
    <div class="lb-img-wrap" id="lbImgWrap"></div>
    <div class="lb-info">
      <h3 id="lbTitle"></h3>
      <p  id="lbDesc"></p>
    </div>
  </div>
</div>

<div id="footer-container"></div>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
let allPhotos = [];
let currentCat = 'all';

document.addEventListener('DOMContentLoaded', loadGallery);

async function loadGallery() {
  const grid = document.getElementById('galleryGrid');
  try {
    allPhotos = await API.getGallery();
    buildCategoryFilters();
    renderGallery();
  } catch {
    grid.innerHTML = `<div class="empty-gallery">
      <i class="fa fa-image"></i>
      <p>Could not load gallery. Please try again later.</p>
    </div>`;
  }
}

function buildCategoryFilters() {
  const cats = ['All Photos', ...new Set(allPhotos.map(p => p.category).filter(Boolean))];
  const bar  = document.getElementById('catFilters');
  bar.innerHTML = cats.map((c,i) =>
    `<button class="filter-btn ${i===0?'active':''}" onclick="filterCat('${i===0?'all':c}',this)">${c}</button>`
  ).join('');
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-filters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery();
}

function renderGallery() {
  const grid = document.getElementById('galleryGrid');
  const photos = currentCat === 'all'
    ? allPhotos
    : allPhotos.filter(p => p.category === currentCat);

  if (!photos.length) {
    grid.innerHTML = `<div class="empty-gallery">
      <i class="fa fa-images"></i>
      <p>No photos in this category yet. Check back soon!</p>
    </div>`;
    return;
  }

  grid.innerHTML = photos.map((p, i) => {
    const imgEl = p.filename
      ? `<img src="/uploads/gallery/${p.filename}" alt="${p.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
         <div class="gal-placeholder" style="display:none"><i class="fa fa-image"></i></div>`
      : `<div class="gal-placeholder"><i class="fa fa-image"></i></div>`;
    return `
      <div class="gal-item" onclick="openLB(${i})">
        ${imgEl}
        <div class="gal-overlay">
          <div class="gal-title">${p.title}</div>
          <div class="gal-cat">${p.category || 'General'}</div>
        </div>
        <div class="gal-zoom"><i class="fa fa-search-plus"></i></div>
      </div>`;
  }).join('');
}

function openLB(idx) {
  const photos = currentCat === 'all'
    ? allPhotos
    : allPhotos.filter(p => p.category === currentCat);
  const p = photos[idx];
  if (!p) return;

  const wrap = document.getElementById('lbImgWrap');
  wrap.innerHTML = p.filename
    ? `<img src="/uploads/gallery/${p.filename}" alt="${p.title}"/>`
    : `<div class="lb-placeholder"><i class="fa fa-image"></i></div>`;

  document.getElementById('lbTitle').textContent = p.title;
  document.getElementById('lbDesc').textContent  =
    [p.description, p.category, p.createdAt ? new Date(p.createdAt).toLocaleDateString('en-IN',{year:'numeric',month:'long'}) : '']
    .filter(Boolean).join(' · ');

  document.getElementById('lightbox').classList.add('open');
}
function closeLB(e) {
  if (e.target === document.getElementById('lightbox'))
    document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('open');
});
</script>
</body>
</html>
